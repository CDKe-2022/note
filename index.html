<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextVault — 多端共享备忘录</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
  <style>
    :root{--bg:#f3f1eb;--bg-side:#ebe7de;--bg-card:#fff;--bg-hover:#f0ece5;--bg-active:#e4dfd6;--border:#d5cfc4;--text:#26231f;--text-2:#6e6860;--text-3:#9e9890;--accent:#b87333;--accent-h:#cc8844;--accent-bg:rgba(184,115,51,.1);--accent-bg2:rgba(184,115,51,.06);--danger:#a84040;--success:#3a8850;--side-w:260px;--font-body:'Times New Roman','Songti SC','SimSun',serif;--font-mono:'JetBrains Mono',monospace;--shadow-card:0 1px 2px rgba(0,0,0,.04),0 6px 18px rgba(0,0,0,.03);--h-header:52px;--h-toolbar:44px;--h-footer:32px;--btn-h:30px;--btn-radius:7px;--gap-xs:4px;--gap-sm:8px;--gap-md:12px;--pad-page:20px}
    body.dark{--bg:#1a1918;--bg-side:#1f1e1c;--bg-card:#252422;--bg-hover:#2e2c29;--bg-active:#363330;--border:#3d3a36;--text:#d6d1c7;--text-2:#a09a90;--text-3:#6e6860;--accent:#cc9044;--accent-h:#dda050;--accent-bg:rgba(204,144,68,.12);--accent-bg2:rgba(204,144,68,.06);--danger:#c45050;--success:#4a9960;--shadow-card:0 1px 2px rgba(0,0,0,.2),0 6px 18px rgba(0,0,0,.15)}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);display:grid;grid-template-rows:var(--h-header) 1fr var(--h-footer);transition:background .4s,color .3s}
    .bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0}
    .bg-deco::before{content:'';position:absolute;top:-12%;right:-8%;width:520px;height:520px;background:radial-gradient(circle,var(--accent-bg2) 0%,transparent 65%);border-radius:50%;animation:orb 50s ease-in-out infinite}
    .bg-deco::after{content:'';position:absolute;bottom:-8%;left:-6%;width:420px;height:420px;background:radial-gradient(circle,var(--accent-bg2) 0%,transparent 65%);border-radius:50%;animation:orb 60s ease-in-out infinite reverse}
    @keyframes orb{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-35px) scale(1.03)}66%{transform:translate(-15px,25px) scale(.97)}}
    header{position:relative;z-index:20;display:flex;align-items:center;padding:0 var(--pad-page);height:var(--h-header);background:var(--bg-card);border-bottom:1px solid var(--border);grid-row:1;transition:background .4s,border-color .3s}
    .h-left,.h-right{display:flex;align-items:center;gap:var(--gap-xs)}.h-left{flex:1}
    .logo{display:flex;align-items:center;gap:var(--gap-sm);user-select:none;margin-left:var(--gap-xs)}
    .logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent-h));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 8px rgba(184,115,51,.25)}
    .logo-name{font-weight:700;font-size:22px;letter-spacing:-.5px}.logo-name span{color:var(--accent)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:var(--btn-h);padding:0 var(--gap-md);border:1px solid var(--border);border-radius:var(--btn-radius);background:var(--bg-card);color:var(--text-2);font:inherit;font-size:13px;cursor:pointer;transition:all .18s;white-space:nowrap;user-select:none;line-height:1}
    .btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--text-3)}.btn:active{transform:scale(.97)}
    .btn-i{width:var(--btn-h);height:var(--btn-h);padding:0}.btn-i svg{display:block}
    .btn.danger:hover{border-color:var(--danger);color:var(--danger)}.btn .lbl{font-weight:600}
    .sep{width:1px;height:18px;background:var(--border);margin:0 var(--gap-xs);flex-shrink:0;transition:background .3s}
    .app-body{position:relative;z-index:10;display:flex;overflow:hidden;min-height:0;grid-row:2}
    .sidebar{width:var(--side-w);flex-shrink:0;background:var(--bg-side);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:margin-left .3s cubic-bezier(.4,0,.2,1),background .4s}
    .sidebar.collapsed{margin-left:calc(-1 * var(--side-w))}
    .side-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0}
    .side-title{font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:1.5px}
    .side-actions{display:flex;gap:4px}
    .side-new{width:28px;height:28px;border:1px dashed var(--border);border-radius:6px;background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .side-new:hover{border-style:solid;border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
    .file-list{flex:1;min-height:0;overflow-y:auto;padding:0 8px 12px}
    .file-list::-webkit-scrollbar{width:5px}.file-list::-webkit-scrollbar-track{background:transparent}.file-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .file-item{display:flex;align-items:center;gap:8px;padding:9px 10px;margin-bottom:2px;border-radius:7px;cursor:pointer;transition:all .15s;position:relative;border:1px solid transparent}
    .file-item:hover{background:var(--bg-hover)}
    .file-item.active{background:linear-gradient(to right,var(--accent-bg),var(--bg-card));border-color:var(--border);box-shadow:var(--shadow-card)}
    .file-item.active::before{content:'';position:absolute;left:-1px;top:4px;bottom:4px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
    .file-item.pinned{background:var(--accent-bg2)}.file-item.pinned:hover{background:var(--accent-bg)}
    .file-item.pinned.active{background:linear-gradient(to right,var(--accent-bg),var(--bg-card));border-color:var(--border);box-shadow:var(--shadow-card)}
    .pin-sep{height:1px;background:var(--border);margin:6px 10px;opacity:.4}
    .file-item[draggable="true"]{cursor:grab}.file-item[draggable="true"]:active{cursor:grabbing}
    .file-item.dragging{opacity:.35;transform:scale(.97)}
    .file-item.drag-over-top{border-top:2px solid var(--accent);margin-top:-1px;background:var(--accent-bg)}
    .file-item.drag-over-bot{border-bottom:2px solid var(--accent);margin-bottom:-1px;background:var(--accent-bg)}
    .fi-icon{color:var(--text-3);flex-shrink:0;display:flex}.file-item.active .fi-icon,.file-item.pinned .fi-icon{color:var(--accent)}
    .fi-info{flex:1;min-width:0}.fi-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
    .fi-meta{display:block;font-size:10px;color:var(--text-3);margin-top:2px;font-family:var(--font-mono)}
    .fi-acts{display:flex;gap:1px;opacity:0;transition:opacity .15s;flex-shrink:0}.file-item:hover .fi-acts,.file-item.active .fi-acts{opacity:1}
    .fa-btn{width:24px;height:24px;border:none;border-radius:5px;background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .fa-btn:hover{background:var(--bg-active);color:var(--text)}.fa-btn.del:hover{color:var(--danger)}.fa-btn.pin-on{color:var(--accent)}.fa-btn.pin-on:hover{color:var(--text-3)}
    .rename-input{width:100%;border:1px solid var(--accent);border-radius:4px;padding:1px 5px;font:600 14px var(--font-body);background:var(--bg-card);color:var(--text);outline:none}
    .toolbar{display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad-page);height:var(--h-toolbar);background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;transition:background .4s,border-color .3s}
    .tb-left,.tb-right{display:flex;align-items:center;gap:var(--gap-xs)}
    .fmt-group{display:flex;gap:var(--gap-xs);background:var(--bg);border:1px solid var(--border);border-radius:var(--btn-radius);padding:2px;transition:background .4s,border-color .3s}
    .fmt-btn{width:30px;height:26px;border:none;border-radius:5px;background:transparent;color:var(--text-2);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--font-body)}
    .fmt-btn:hover{background:var(--bg-hover);color:var(--text)}.fmt-btn.on{background:var(--bg-card);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.07)}
    .fmt-b{font-weight:800}.fmt-u{text-decoration:underline;font-weight:600;text-underline-offset:2px}
    .t-btn{width:30px;height:26px;border:1px solid transparent;border-radius:5px;background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
    .t-btn:hover{background:var(--bg-hover);color:var(--text-2);border-color:var(--border)}.t-btn.on{color:var(--accent);background:var(--accent-bg)}
    .fs-ctrl{display:flex;align-items:center;gap:var(--gap-xs);margin-left:var(--gap-xs)}
    .fs-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:5px;background:var(--bg-card);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .fs-btn:hover{border-color:var(--accent);color:var(--accent)}.fs-val{min-width:26px;text-align:center;font:12px var(--font-mono);color:var(--text-2)}
    .main-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;transition:padding-left .3s}
    .editor-wrap{flex:1;min-height:0;position:relative;overflow-y:auto;overflow-x:hidden;background:var(--bg-card);transition:background .4s}
    .editor-wrap::-webkit-scrollbar{width:6px}.editor-wrap::-webkit-scrollbar-track{background:transparent}.editor-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}.editor-wrap::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
    #editor{padding:28px 32px 48px;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:17px;line-height:2;letter-spacing:.01em;white-space:pre-wrap;word-wrap:break-word;caret-color:var(--accent);min-height:100%;transition:color .3s}
    #editor ::selection,#editor *::selection{background:var(--accent-bg);color:var(--text)}
    .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;z-index:2;transition:opacity .3s}.empty.hide{opacity:0}
    .empty-ico{width:72px;height:72px;border:2px dashed var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--text-3);animation:breathe 5s ease-in-out infinite}
    @keyframes breathe{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.7;transform:scale(1.015)}}
    .empty-t{font-size:15px;color:var(--text-3)}.empty-h{font-size:12px;color:var(--text-3);opacity:.6}.empty-h kbd{display:inline-block;padding:1px 5px;border:1px solid var(--border);border-radius:3px;font:11px var(--font-mono);background:var(--bg-card)}
    .find-bar{position:sticky;top:0;z-index:5;background:var(--bg-card);border-bottom:1px solid var(--border);padding:6px 12px;display:none;gap:6px;align-items:center;font-size:13px}
    .find-bar input{border:1px solid var(--border);border-radius:4px;padding:2px 6px;font:13px var(--font-mono);background:var(--bg);color:var(--text);outline:none}.find-bar input:focus{border-color:var(--accent)}
    .find-bar button{border:none;background:var(--accent-bg);color:var(--accent);padding:2px 8px;border-radius:4px;cursor:pointer}
    footer{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad-page);height:var(--h-footer);background:var(--bg-card);border-top:1px solid var(--border);grid-row:3;transition:background .4s,border-color .3s}
    .st-l,.st-r{display:flex;align-items:center;gap:14px}.st{font:11px var(--font-mono);color:var(--text-3);display:flex;align-items:center;gap:3px}.st .dot{width:5px;height:5px;border-radius:50%;background:var(--success);animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .save-ind{font:11px var(--font-body);color:var(--text-3);opacity:0;transition:opacity .25s;display:flex;align-items:center;gap:4px}.save-ind.on{opacity:1}.save-ind svg{color:var(--success)}
    .toast-box{position:fixed;top:64px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px}
    .toast{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);box-shadow:var(--shadow-card);font-size:13px;color:var(--text);transform:translateX(120%);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
    .toast.in{transform:translateX(0);opacity:1}.toast.out{transform:translateX(120%);opacity:0;transition:all .2s ease-in}.toast svg{color:var(--accent);flex-shrink:0}
    .drop-ov{position:fixed;inset:0;background:rgba(184,115,51,.04);border:3px dashed var(--accent);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}.drop-ov.on{display:flex}.drop-ov span{font-size:17px;color:var(--accent);font-weight:500}
    body.focus{grid-template-rows:1fr}body.focus header,body.focus footer,body.focus .sidebar,body.focus .toolbar{display:none}body.focus .app-body{grid-row:1}body.focus #editor{padding:60px 40px 100px}body.focus .focus-exit{display:flex}
    .focus-exit{display:none;position:fixed;top:14px;right:14px;z-index:200;width:var(--btn-h);height:var(--btn-h);border:1px solid var(--border);border-radius:var(--btn-radius);background:var(--bg-card);color:var(--text-3);cursor:pointer;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.08);transition:all .15s}.focus-exit:hover{color:var(--text);border-color:var(--text-3)}
    #fileInput{display:none}
    .btn-theme{width:var(--btn-h);height:var(--btn-h);border:1px solid var(--border);border-radius:var(--btn-radius);background:var(--bg-card);color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;padding:0}.btn-theme:hover{background:var(--bg-hover);color:var(--text);border-color:var(--text-3)}.btn-theme svg{transition:transform .3s}.btn-theme:hover svg{transform:rotate(20deg)}
    body.dark .btn-theme .icon-sun{display:block}body.dark .btn-theme .icon-moon{display:none}body:not(.dark) .btn-theme .icon-sun{display:none}body:not(.dark) .btn-theme .icon-moon{display:block}
    @media(max-width:768px){.sidebar{position:absolute;z-index:30;height:100%;box-shadow:4px 0 16px rgba(0,0,0,.08)}.sidebar.collapsed{margin-left:calc(-1 * var(--side-w))}header,.toolbar{padding:0 var(--gap-sm)}#editor{padding:24px 16px 48px;max-width:100%}.btn .lbl,.logo-name,.sep{display:none}footer{padding:0 var(--gap-sm)}.st-r{display:none}body.focus #editor{padding:28px 16px 60px;max-width:100%}}
  </style>
</head>
<body>
  <div class="bg-deco"></div>
  <header>
    <div class="h-left"><div class="logo"><div class="logo-mark"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1.5h6.5L13 5v9.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-13a1 1 0 0 1 1-1z"/><path d="M9.5 1.5V5H13"/></svg></div><div class="logo-name">Text<span>Vault</span></div></div></div>
    <div class="h-right">
      <button class="btn" id="btnOpen" title="导入文件"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14V4.5"/><path d="M4.5 7.5L8 4l3.5 3.5"/><path d="M2 2h12"/></svg><span class="lbl">导入</span></button>
      <input type="file" id="fileInput" accept=".txt,.md,.log,.csv,.json,.xml,.html,.css,.js,.py,.java,.c,.cpp,.sh,.yml,.yaml,.toml,.ini,.cfg,.conf,.env">
      <button class="btn" id="btnDown" title="下载当前文件"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9.5"/><path d="M4.5 8.5L8 12l3.5-3.5"/><path d="M2 14h12"/></svg><span class="lbl">下载</span></button>
      <div class="sep"></div>
      <button class="btn danger" id="btnClear" title="清空当前文件内容"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10"/><path d="M5.5 4.5V3h5v1.5"/><path d="M4.5 4.5l.8 9h5.4l.8-9"/></svg><span class="lbl">清空</span></button>
      <div class="sep"></div>
      <button class="btn btn-i" id="btnFocus" title="专注模式"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 2 2 6 2"/><polyline points="10 2 14 2 14 6"/><polyline points="14 10 14 14 10 14"/><polyline points="6 14 2 14 2 10"/></svg></button>
      <button class="btn-theme" id="btnTheme" title="切换深色模式"><svg class="icon-moon" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8.5A6 6 0 0 1 7.5 2 6 6 0 1 0 14 8.5z"/></svg><svg class="icon-sun" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3"/><path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M3.4 12.6l.7-.7M11.9 4.1l.7-.7"/></svg></button>
    </div>
  </header>
  <div class="app-body">
    <aside class="sidebar" id="sidebar">
      <div class="side-head"><span class="side-title">文件列表</span><div class="side-actions">
        <button class="side-new" id="btnNew" title="新建文件"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg></button>
        <button class="side-new" id="btnCloseSide" title="收起侧栏"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10 3 5 8 10 13"/></svg></button>
      </div></div>
      <div class="file-list" id="fileList"></div>
    </aside>
    <div class="main-area">
      <div class="toolbar"><div class="tb-left">
        <button class="t-btn" id="btnOpenSide" title="展开侧栏"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 3 10 8 5 13"/></svg></button>
        <div class="sep" id="sepOpenSide"></div>
        <div class="fmt-group"><button class="fmt-btn" id="btnBold" title="加粗 (Ctrl+B)"><span class="fmt-b">B</span></button><button class="fmt-btn" id="btnULine" title="下划线 (Ctrl+U)"><span class="fmt-u">U</span></button></div>
        <div class="sep"></div>
        <button class="t-btn on" id="btnWrap" title="自动换行"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h12M2 7h12M2 11h8"/><path d="M10 11l-2.5-2M10 11l-2.5 2"/></svg></button>
      </div><div class="tb-right"><div class="fs-ctrl">
        <button class="fs-btn" id="fsMinus" title="缩小字体"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="8" x2="13" y2="8"/></svg></button>
        <span class="fs-val" id="fsVal">17</span>
        <button class="fs-btn" id="fsPlus" title="放大字体"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg></button>
      </div></div></div>
      <div class="editor-wrap">
        <div class="find-bar" id="findBar"><input id="findInput" placeholder="查找"><input id="replaceInput" placeholder="替换"><button id="findNext">下一个</button><button id="replaceBtn">替换</button><button id="replaceAllBtn">全部</button><button id="closeFind">✕</button></div>
        <div class="empty" id="emptyState"><div class="empty-ico"><svg width="26" height="26" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="1" width="7" height="3" rx=".8"/><path d="M4 3H2.5v12h11V3H12"/><path d="M5.5 7h5M5.5 10h3"/></svg></div><div class="empty-t">粘贴或输入文本</div><div class="empty-h"><kbd>Ctrl</kbd>+<kbd>V</kbd> 粘贴 &middot; <kbd>Ctrl</kbd>+<kbd>B</kbd> 加粗 &middot; <kbd>Ctrl</kbd>+<kbd>U</kbd> 下划线</div></div>
        <div id="editor" contenteditable="true" spellcheck="false"></div>
      </div>
    </div>
  </div>
  <footer>
    <div class="st-l"><div class="st"><span class="dot"></span>就绪</div><div class="st" id="stChars">字符: 0</div><div class="st" id="stWords">字数: 0</div><div class="st" id="stLines">行数: 1</div></div>
    <div class="st-r"><div class="save-ind" id="saveInd"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3.5 3.5L13 5"/></svg> 已自动保存</div><div class="st">UTF-8</div></div>
  </footer>
  <div class="toast-box" id="toastBox"></div>
  <div class="drop-ov" id="dropOv"><span><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><path d="M8 2v8.5"/><path d="M4.5 7.5L8 11l3.5-3.5"/><path d="M2 14h12"/></svg> 释放以打开文件</span></div>
  <button class="focus-exit" id="focusExit" title="退出专注 (Esc)"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 2 2 2 2 6"/><polyline points="14 6 14 2 10 2"/><polyline points="10 14 14 14 14 10"/><polyline points="2 10 2 14 6 14"/></svg></button>
  <script>
  (function(){
    'use strict';
    const PURIFY_CFG={ALLOWED_TAGS:['br','b','strong','u','i','em','span','div','p'],ALLOWED_ATTR:['style'],ALLOW_DATA_ATTR:false};
    // 降级正则方案（DOMPurify加载失败时使用，存在局限）
    function safeSanitize(h){if(window.DOMPurify)return DOMPurify.sanitize(h,PURIFY_CFG);return h.replace(/<[^>]*(style|on\w+)[^>]*>/gi,'').replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi,'')}
    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function timeAgo(ts){if(!ts)return'';const d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return'刚刚';if(m<60)return m+'分钟前';const h=Math.floor(m/60);if(h<24)return h+'小时前';const day=Math.floor(h/24);if(day<30)return day+'天前';return new Date(ts).toLocaleDateString('zh-CN')}
    const IC={file:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1.5h6.5L13 5v9.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-13a1 1 0 0 1 1-1z"/><path d="M9.5 1.5V5H13"/></svg>',edit:'<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2-8 8-3 1 1-3z"/><path d="M10 4l2 2"/></svg>',trash:'<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10"/><path d="M5.5 4.5V3h5v1.5"/><path d="M4.5 4.5l.8 9h5.4l.8-9"/></svg>',pin:'<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11V2"/><path d="M4.5 5.5L8 2l3.5 3.5"/><line x1="3" y1="14" x2="13" y2="14"/></svg>'};

    /* ===== 离线同步队列 ===== */
    let syncQueue=JSON.parse(localStorage.getItem('syncQueue')||'[]');
    function addToQueue(act){syncQueue.push(act);localStorage.setItem('syncQueue',JSON.stringify(syncQueue))}
    setInterval(async()=>{if(!navigator.onLine||!syncQueue.length)return;const q=[...syncQueue];syncQueue=[];for(let i=0;i<q.length;i++){try{await fetch(q[i].url,q[i].opt)}catch(e){syncQueue=q.slice(i);break}}localStorage.setItem('syncQueue',JSON.stringify(syncQueue))},30000);

    const API_BASE='https://note2.kehuang.eu.org/api/notes';
    async function apiRequest(method,data,id){
      const token=localStorage.getItem('token')||'',headers={Authorization:'Bearer '+token,'Content-Type':'application/json'};
      let url=API_BASE;if(id!==undefined&&id!==null)url+='/'+id;
      const opt={method,headers};if(data&&method!=='GET'&&method!=='DELETE')opt.body=JSON.stringify(data);
      try{const res=await fetch(url,opt);if(!res.ok){let msg;try{msg=(await res.json()).error||res.statusText}catch{msg=res.statusText}throw new Error(msg)}if(res.status===204)return null;return res.json()}
      catch(e){if(method==='POST')addToQueue({url,opt});throw e}
    }
    async function fetchNotes(){return apiRequest('GET')}
    async function fetchNote(id){return apiRequest('GET',null,id)}
    async function createNote(n,c){return apiRequest('POST',{name:n,content:c})}
    async function updateNote(id,d){return apiRequest('PUT',d,id)}
    async function deleteNote(id){return apiRequest('DELETE',null,id)}
    let loadingNote=false;

    /* ===== Undo快照 ===== */
    let undoStack=[],redoStack=[];
    function pushUndo(){undoStack.push(editor.innerHTML);if(undoStack.length>50)undoStack.shift();redoStack=[]}
    function doUndo(){if(!undoStack.length)return;redoStack.push(editor.innerHTML);editor.innerHTML=undoStack.pop();scheduleStats();autoSave()}
    function doRedo(){if(!redoStack.length)return;undoStack.push(editor.innerHTML);editor.innerHTML=redoStack.pop();scheduleStats();autoSave()}

    /* ===== Store（含预分配ID） ===== */
    const store={
      files:[],activeId:null,counter:1,fontSize:17,wordWrap:true,isFocus:false,_creating:false,
      get active(){return this.files.find(f=>f.id===this.activeId)||null},
      _norm(n,w){return{id:String(n.id),name:n.name||'未命名',content:w?(n.content||''):null,charCount:n.charCount||0,_loaded:!!w,createdAt:n.createdAt||Date.now(),updatedAt:n.updatedAt||Date.now(),pinned:n.pinned||0,sort_order:n.sort_order||0}},
      async restore(){try{const ns=await fetchNotes();this.files=ns.map(n=>this._norm(n,false));this.counter=this.files.filter(n=>n.name.startsWith('未命名')).length+1;if(this.files.length>0)this.activeId=this.files[0].id;return true}catch(e){toast('获取笔记失败: '+e.message);return false}},
      async createFile(silent,name,content){
        if(this._creating)return null;this._creating=true;
        const fn=name||'未命名 '+this.counter++;
        // 预分配临时ID，立即渲染
        const tempId='local_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
        const nr=this._norm({id:tempId,name:fn,content:content||'',charCount:content?content.replace(/<[^>]*>/g,'').length:0,createdAt:Date.now(),updatedAt:Date.now(),pinned:0,sort_order:0},true);
        this.files.unshift(nr);this.activeId=tempId;
        renderList();editor.innerHTML=content?safeSanitize(content):'';scheduleStats();
        if(!silent)toast('已新建: '+fn);
        // 异步同步到服务器
        try{const n=await createNote(fn,content||'');const realId=String(n.id);
          if(realId!==tempId){nr.id=realId;nr.updatedAt=n.updatedAt||Date.now();if(this.activeId===tempId)this.activeId=realId;renderList()}
        }catch(e){console.warn('同步创建失败:',e.message)}
        this._creating=false;return nr
      },
      async switchFile(id){if(String(id)===String(this.activeId))return;await this.saveCurrent();this.activeId=String(id);renderList();await loadEditor()},
      async deleteFile(id){try{await deleteNote(id);const i=this.files.findIndex(f=>f.id===String(id));if(i===-1)return;const nm=this.files[i].name;this.files.splice(i,1);if(String(this.activeId)===String(id))this.activeId=this.files.length?this.files[0].id:null;renderList();await loadEditor();toast('已删除: '+nm)}catch(e){toast('删除笔记失败: '+e.message)}},
      async renameFile(id,nm){const f=this.files.find(x=>x.id===String(id));if(f&&nm.trim()){try{const u=await updateNote(id,{name:nm.trim()});f.name=u.name||nm.trim();f.updatedAt=u.updatedAt||Date.now()}catch(e){toast('重命名失败: '+e.message)}renderList()}},
      async saveCurrent(){
        if(!this.activeId||loadingNote)return;const f=this.active;if(!f||!f._loaded)return;
        // 临时ID跳过保存，等服务器返回真实ID
        if(f.id.startsWith('local_'))return;
        const c=editor.innerHTML;if(c===f.content)return;
        try{const u=await updateNote(f.id,{content:c});f.content=u.content||c;f.updatedAt=u.updatedAt||Date.now();f.charCount=c.replace(/<[^>]*>/g,'').length;renderList()}catch(e){toast('保存失败: '+e.message)}
      },
      async clearCurrent(){const f=this.active;if(!f||!f._loaded)return;if(!getEditorText().trim())return;pushUndo();editor.innerHTML='';try{const u=await updateNote(f.id,{content:''});f.content='';f.charCount=0;f.updatedAt=u.updatedAt||Date.now()}catch(e){toast('清空失败: '+e.message)}scheduleStats();renderList();toast('已清空: '+f.name)},
      downloadCurrent(){const f=this.active,t=getEditorText().trim();if(!t){toast('当前文件为空');return}const b=new Blob([t],{type:'text/plain;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=(f?f.name:'textvault')+'.txt';a.click();URL.revokeObjectURL(u);toast('已下载: '+a.download)},
      async togglePin(id){const f=this.files.find(x=>x.id===String(id));if(!f)return;const np=f.pinned?0:1;f.pinned=np;this.files.sort((a,b)=>b.pinned-a.pinned||a.sort_order-b.sort_order||b.updatedAt-a.updatedAt);renderList();try{await updateNote(id,{pinned:np});toast(np?'已置顶: '+f.name:'已取消置顶: '+f.name)}catch(e){toast('操作失败');f.pinned=np?0:1;this.files.sort((a,b)=>b.pinned-a.pinned||a.sort_order-b.sort_order||b.updatedAt-a.updatedAt);renderList()}},
      async moveFile(fid,tid,pos){const fi=this.files.findIndex(f=>f.id===String(fid));const[mf]=this.files.splice(fi,1);const ti=this.files.findIndex(f=>f.id===String(tid));this.files.splice(pos==='before'?ti:ti+1,0,mf);const grp=this.files.filter(f=>f.pinned===mf.pinned),ups=[];const step=1000;for(let i=0;i<grp.length;i++){const no=(i+1)*step;if(grp[i].sort_order!==no){grp[i].sort_order=no;ups.push({id:grp[i].id,sort_order:no})}}renderList();try{for(const u of ups)await updateNote(u.id,{sort_order:u.sort_order})}catch(e){toast('排序保存失败')}},
    };

    const editor=document.getElementById('editor'),emptyState=document.getElementById('emptyState'),fileListEl=document.getElementById('fileList'),sidebar=document.getElementById('sidebar'),fsVal=document.getElementById('fsVal'),stChars=document.getElementById('stChars'),stWords=document.getElementById('stWords'),stLines=document.getElementById('stLines'),saveInd=document.getElementById('saveInd'),toastBox=document.getElementById('toastBox'),dropOv=document.getElementById('dropOv'),fileInput=document.getElementById('fileInput'),btnBold=document.getElementById('btnBold'),btnULine=document.getElementById('btnULine');
    function getEditorText(){return editor.innerText.replace(/\u00A0/g,' ').trimEnd()}
    function countWords(t){if(!t)return 0;const c=t.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3000-\u303f\uff00-\uffef]/g);const cc=c?c.length:0;const r=t.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3000-\u303f\uff00-\uffef]/g,' ');return cc+r.trim().split(/\s+/).filter(w=>w.length>0).length}
    function updateStats(){const t=getEditorText();stChars.textContent='字符: '+t.replace(/\n/g,'').length;stWords.textContent='字数: '+countWords(t);stLines.textContent='行数: '+(t?t.split('\n').length:0)}
    function updateEmpty(){emptyState.classList.toggle('hide',getEditorText().length>0)}
    let statsRaf=null;function scheduleStats(){if(statsRaf)return;statsRaf=requestAnimationFrame(()=>{updateStats();updateEmpty();statsRaf=null})}
    function renderList(){let h='',lp=false;store.files.forEach((f,i)=>{if(i>0&&lp&&!f.pinned)h+='<div class="pin-sep"></div>';lp=f.pinned;const a=String(f.id)===String(store.activeId),c=f.charCount||0;h+='<div class="file-item'+(a?' active':'')+(f.pinned?' pinned':'')+'" data-id="'+f.id+'" draggable="true"><span class="fi-icon">'+(f.pinned?IC.pin:IC.file)+'</span><span class="fi-info"><span class="fi-name">'+esc(f.name)+'</span><span class="fi-meta">'+c+' 字 &middot; '+timeAgo(f.updatedAt)+'</span></span><span class="fi-acts"><button class="fa-btn act-pin'+(f.pinned?' pin-on':'')+'" title="'+(f.pinned?'取消置顶':'置顶')+'">'+IC.pin+'</button><button class="fa-btn act-rename" title="重命名">'+IC.edit+'</button><button class="fa-btn del act-del" title="删除">'+IC.trash+'</button></span></div>'});fileListEl.innerHTML=h}
    document.execCommand('defaultParagraphSeparator',false,'br');
    async function loadEditor(){const f=store.active;if(!f){editor.innerHTML='';scheduleStats();return}if(!f._loaded){loadingNote=true;try{const n=await fetchNote(f.id);f.content=n.content||'';f.charCount=n.content?n.content.replace(/<[^>]*>/g,'').length:0;f.pinned=n.pinned||0;f.sort_order=n.sort_order||0;f._loaded=true;renderList()}catch(e){toast('加载笔记失败: '+e.message);editor.innerHTML='';loadingNote=false;scheduleStats();return}loadingNote=false}editor.innerHTML=safeSanitize(f.content||'');scheduleStats()}
    function applyFontSize(s){store.fontSize=Math.max(12,Math.min(30,s));fsVal.textContent=store.fontSize;editor.style.fontSize=store.fontSize+'px'}
    applyFontSize(store.fontSize);document.getElementById('fsMinus').addEventListener('click',()=>applyFontSize(store.fontSize-1));document.getElementById('fsPlus').addEventListener('click',()=>applyFontSize(store.fontSize+1));
    function applyWrap(w){store.wordWrap=w;editor.style.whiteSpace=w?'pre-wrap':'pre';document.getElementById('btnWrap').classList.toggle('on',w)}
    applyWrap(store.wordWrap);document.getElementById('btnWrap').addEventListener('click',()=>applyWrap(!store.wordWrap));
    let saveTimer=null;
    // 输入节流200ms
    let inputTimer=null;editor.addEventListener('input',()=>{pushUndo();clearTimeout(inputTimer);inputTimer=setTimeout(()=>{scheduleStats();autoSave()},200)});
    function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{const f=store.active;if(f&&f._loaded&&!loadingNote&&editor.innerHTML!==f.content)store.saveCurrent().then(()=>{saveInd.classList.add('on');setTimeout(()=>saveInd.classList.remove('on'),1400)}).catch(e=>toast('自动保存失败: '+e.message))},3000)}
    editor.addEventListener('paste',e=>{e.preventDefault();const t=e.clipboardData.getData('text/plain');if(!t)return;pushUndo();document.execCommand('insertText',false,t);requestAnimationFrame(()=>{scheduleStats();autoSave()})});
    editor.addEventListener('keydown',e=>{
      if(e.key==='Tab'){e.preventDefault();document.execCommand('insertText',false,'    ')}
      if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();if(e.shiftKey)doRedo();else doUndo()}
      if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();doRedo()}
      if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();duplicateLine()}
      if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('findBar').style.display='flex';document.getElementById('findInput').focus()}
    });
    // Ctrl+D复制当前行
    function duplicateLine(){const sel=window.getSelection();if(!sel.rangeCount)return;pushUndo();const node=sel.anchorNode;let block=node.nodeType===3?node.parentElement:node;while(block.parentElement!==editor&&block.parentElement!==null)block=block.parentElement;if(block.parentElement===editor){const clone=block.cloneNode(true);editor.insertBefore(clone,block.nextSibling);const r=document.createRange();r.selectNodeContents(clone);r.collapse(true);sel.removeAllRanges();sel.addRange(r)}}
    // 查找替换
    document.getElementById('closeFind').addEventListener('click',()=>document.getElementById('findBar').style.display='none');
    document.getElementById('findNext').addEventListener('click',()=>window.find(document.getElementById('findInput').value));
    document.getElementById('replaceBtn').addEventListener('click',()=>{if(window.find(document.getElementById('findInput').value)){pushUndo();document.execCommand('insertText',false,document.getElementById('replaceInput').value)}});
    document.getElementById('replaceAllBtn').addEventListener('click',()=>{pushUndo();const r=new RegExp(document.getElementById('findInput').value.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');editor.innerHTML=editor.innerHTML.replace(r,document.getElementById('replaceInput').value);scheduleStats();autoSave()});
    // 定期清理冗余标签
    setInterval(()=>{if(!editor.innerHTML)return;editor.querySelectorAll('span').forEach(s=>{if(!s.attributes.length)s.replaceWith(...s.childNodes)})},10000);

    function updateFmt(){btnBold.classList.toggle('on',document.queryCommandState('bold'));btnULine.classList.toggle('on',document.queryCommandState('underline'))}
    btnBold.addEventListener('mousedown',e=>{e.preventDefault();pushUndo();document.execCommand('bold');updateFmt()});
    btnULine.addEventListener('mousedown',e=>{e.preventDefault();pushUndo();document.execCommand('underline');updateFmt()});
    document.addEventListener('selectionchange',()=>{if(document.activeElement===editor)updateFmt()});editor.addEventListener('keyup',updateFmt);editor.addEventListener('mouseup',updateFmt);
    fileListEl.addEventListener('click',e=>{const item=e.target.closest('.file-item');if(!item)return;const id=item.dataset.id;if(e.target.closest('.act-pin')){store.togglePin(id);return}if(e.target.closest('.act-rename')){startRename(id);return}if(e.target.closest('.act-del')){store.deleteFile(id);return}store.switchFile(id)});
    fileListEl.addEventListener('dblclick',e=>{const n=e.target.closest('.fi-name');if(!n)return;const item=n.closest('.file-item');if(item)startRename(item.dataset.id)});
    let dragId=null;
    fileListEl.addEventListener('dragstart',e=>{const item=e.target.closest('.file-item');if(!item)return;dragId=item.dataset.id;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragId)});
    fileListEl.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';fileListEl.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(el=>el.classList.remove('drag-over-top','drag-over-bot'));const item=e.target.closest('.file-item');if(!item||item.dataset.id===dragId)return;const rect=item.getBoundingClientRect();item.classList.add(e.clientY<rect.top+rect.height/2?'drag-over-top':'drag-over-bot')});
    fileListEl.addEventListener('dragleave',e=>{const item=e.target.closest('.file-item');if(item)item.classList.remove('drag-over-top','drag-over-bot')});
    fileListEl.addEventListener('drop',e=>{e.preventDefault();fileListEl.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(el=>el.classList.remove('drag-over-top','drag-over-bot'));const ti=e.target.closest('.file-item');if(!ti||!dragId)return;const tid=ti.dataset.id;if(tid===dragId){dragId=null;return}const ff=store.files.find(f=>f.id===String(dragId)),tf=store.files.find(f=>f.id===String(tid));if(ff.pinned!==tf.pinned){toast('不能跨组拖拽');dragId=null;return}const rect=ti.getBoundingClientRect();store.moveFile(dragId,tid,e.clientY<rect.top+rect.height/2?'before':'after');dragId=null});
    fileListEl.addEventListener('dragend',()=>{fileListEl.querySelectorAll('.dragging,.drag-over-top,.drag-over-bot').forEach(el=>el.classList.remove('dragging','drag-over-top','drag-over-bot'));dragId=null});
    function startRename(id){const f=store.files.find(x=>x.id===String(id));if(!f)return;const item=fileListEl.querySelector('[data-id="'+id+'"]'),ne=item.querySelector('.fi-name');const inp=document.createElement('input');inp.type='text';inp.value=f.name;inp.className='rename-input';ne.replaceWith(inp);inp.focus();inp.select();let done=false;const finish=()=>{if(done)return;done=true;store.renameFile(id,inp.value)};inp.addEventListener('blur',finish);inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();finish()}if(e.key==='Escape'){done=true;renderList()}})}
    document.getElementById('btnNew').addEventListener('click',()=>store.createFile(false));
    document.getElementById('btnOpen').addEventListener('click',()=>fileInput.click());
    fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f);fileInput.value=''});
    function readFile(file){const r=new FileReader();r.onload=e=>{const h=esc(e.target.result).replace(/\n/g,'<br>');store.createFile(false,file.name.replace(/\.[^.]+$/,''),safeSanitize(h))};r.onerror=()=>toast('文件读取失败');r.readAsText(file,'UTF-8')}
    document.getElementById('btnDown').addEventListener('click',()=>store.downloadCurrent());
    document.getElementById('btnClear').addEventListener('click',()=>store.clearCurrent());
    // 侧栏分体逻辑
    const btnOpenSide=document.getElementById('btnOpenSide'),sepOpenSide=document.getElementById('sepOpenSide'),btnCloseSide=document.getElementById('btnCloseSide');
    function updateSidebarButtons(){const c=sidebar.classList.contains('collapsed');btnOpenSide.style.display=c?'':'none';sepOpenSide.style.display=c?'':'none'}
    btnOpenSide.addEventListener('click',()=>{sidebar.classList.remove('collapsed');updateSidebarButtons()});
    btnCloseSide.addEventListener('click',()=>{sidebar.classList.add('collapsed');updateSidebarButtons()});updateSidebarButtons();
    let dragN=0;
    document.addEventListener('dragenter',e=>{if(e.dataTransfer&&e.dataTransfer.types.includes('Files')){e.preventDefault();dragN++;dropOv.classList.add('on')}});
    document.addEventListener('dragleave',e=>{e.preventDefault();dragN--;if(dragN<=0){dragN=0;dropOv.classList.remove('on')}});
    document.addEventListener('dragover',e=>{if(e.dataTransfer&&e.dataTransfer.types.includes('Files'))e.preventDefault()});
    document.addEventListener('drop',e=>{if(!e.dataTransfer||!e.dataTransfer.types.includes('Files'))return;e.preventDefault();dragN=0;dropOv.classList.remove('on');const f=e.dataTransfer.files[0];if(f)readFile(f)});
    document.getElementById('btnFocus').addEventListener('click',()=>{store.isFocus=true;document.body.classList.add('focus');editor.focus()});
    document.getElementById('focusExit').addEventListener('click',exitFocus);
    function exitFocus(){store.isFocus=false;document.body.classList.remove('focus')}
    const btnTheme=document.getElementById('btnTheme');
    function applyTheme(dark){document.body.classList.toggle('dark',dark);localStorage.setItem('theme',dark?'dark':'light')}
    const savedTheme=localStorage.getItem('theme');if(savedTheme==='dark'||(!savedTheme&&window.matchMedia('(prefers-color-scheme:dark)').matches))applyTheme(true);
    btnTheme.addEventListener('click',()=>applyTheme(!document.body.classList.contains('dark')));
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&store.isFocus)exitFocus();if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();const f=store.active;if(f&&f._loaded&&!loadingNote&&editor.innerHTML!==f.content)store.saveCurrent().then(()=>{saveInd.classList.add('on');setTimeout(()=>saveInd.classList.remove('on'),1400);toast('已保存')}).catch(e=>toast('保存失败: '+e.message));else toast('内容未变化')}});
    window.addEventListener('beforeunload',()=>{const f=store.active;if(f&&f._loaded&&editor.innerHTML!==f.content){const tk=localStorage.getItem('token')||'';fetch('https://note2.kehuang.eu.org/api/notes/'+f.id,{method:'PUT',headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'},body:JSON.stringify({content:editor.innerHTML}),keepalive:true})}});
    function toast(msg){const el=document.createElement('div');el.className='toast';el.innerHTML='<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3.5 3.5L13 5"/></svg>'+esc(msg);toastBox.appendChild(el);requestAnimationFrame(()=>el.classList.add('in'));setTimeout(()=>{el.classList.remove('in');el.classList.add('out');setTimeout(()=>el.remove(),250)},2000)}
    store.restore().then(async()=>{if(store.files.length===0)await store.createFile(true);renderList();await loadEditor();applyFontSize(store.fontSize);editor.focus()}).catch(e=>toast('初始化失败: '+e.message));
  })();
  </script>
</body>
</html>
