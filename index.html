<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextVault — 多端共享备忘录</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ===== 基础 & CSS 变量 ===== */
        :root {
            --bg: #f5f2ec;
            --bg-side: #ece8e0;
            --bg-card: #ffffff;
            --bg-hover: #f0ece5;
            --bg-active: #e4dfd6;
            --border: #d8d2c8;
            --text: #2d2822;
            --text-2: #7a756e;
            --text-3: #a5a098;
            --accent: #c08040;
            --accent-h: #d09050;
            --accent-bg: rgba(192,128,64,0.1);
            --danger: #b04848;
            --success: #3a9958;
            --side-w: 260px;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            grid-template-rows: 52px 1fr 28px;
        }

        /* ===== 背景装饰 ===== */
        .bg-deco { position:fixed; inset:0; pointer-events:none; z-index:0; }
        .bg-deco::before {
            content:''; position:absolute;
            top:-15%; right:-10%; width:500px; height:500px;
            background:radial-gradient(circle, var(--accent-bg) 0%, transparent 70%);
            border-radius:50%; animation:orb 22s ease-in-out infinite;
        }
        .bg-deco::after {
            content:''; position:absolute;
            bottom:-10%; left:-8%; width:400px; height:400px;
            background:radial-gradient(circle, var(--accent-bg) 0%, transparent 70%);
            border-radius:50%; animation:orb 28s ease-in-out infinite reverse;
        }
        @keyframes orb {
            0%,100%{transform:translate(0,0) scale(1)}
            33%{transform:translate(25px,-35px) scale(1.04)}
            66%{transform:translate(-15px,25px) scale(.96)}
        }

        /* ===== 顶栏 ===== */
        header {
            position:relative; z-index:20;
            display:flex; align-items:center;
            padding:0 20px;
            background:var(--bg-card); border-bottom:1px solid var(--border);
        }
        .h-left,.h-right { display:flex; align-items:center; gap:5px; }
        .h-left { flex:1; }
        .logo { display:flex; align-items:center; gap:9px; user-select:none; }
        .logo-mark {
            width:32px; height:32px;
            background:linear-gradient(135deg, var(--accent), var(--accent-h));
            border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            color:#fff;
        }
        .logo-name { font-weight:700; font-size:17px; letter-spacing:-0.3px; }
        .logo-name span { color:var(--accent); }

        .btn {
            display:inline-flex; align-items:center; gap:6px;
            padding:6px 12px; border:1px solid var(--border); border-radius:7px;
            background:var(--bg-card); color:var(--text-2);
            font:inherit; font-size:13px;
            cursor:pointer; transition:all .18s ease;
            white-space:nowrap; user-select:none; line-height:1;
        }
        .btn:hover { background:var(--bg-hover); color:var(--text); border-color:var(--text-3); }
        .btn:active { transform:scale(.97); }
        .btn-i { padding:6px 8px; }
        .btn-i svg { display:block; }
        .btn.danger:hover { border-color:var(--danger); color:var(--danger); }
        .sep { width:1px; height:20px; background:var(--border); margin:0 3px; flex-shrink:0; }

        /* ===== 主体布局 ===== */
        .app-body {
            position:relative; z-index:10;
            display:flex; overflow:hidden; min-height:0;
        }

        /* ===== 侧栏 ===== */
        .sidebar {
            width:var(--side-w); flex-shrink:0;
            background:var(--bg-side); border-right:1px solid var(--border);
            display:flex; flex-direction:column; overflow:hidden;
            transition:margin-left .3s cubic-bezier(.4,0,.2,1);
        }
        .sidebar.collapsed { margin-left:calc(-1 * var(--side-w)); }
        .side-head {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 16px 10px; flex-shrink:0;
        }
        .side-title {
            font-size:12px; font-weight:600;
            color:var(--text-3); text-transform:uppercase; letter-spacing:1px;
        }
        .side-new {
            width:28px; height:28px;
            border:1px dashed var(--border); border-radius:6px;
            background:transparent; color:var(--text-3);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:all .2s;
        }
        .side-new:hover {
            border-style:solid; border-color:var(--accent);
            color:var(--accent); background:var(--accent-bg);
        }
        .file-list { flex:1; min-height:0; overflow-y:auto; padding:0 8px 12px; }
        .file-list::-webkit-scrollbar { width:5px; }
        .file-list::-webkit-scrollbar-track { background:transparent; }
        .file-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        .file-item {
            display:flex; align-items:center; gap:8px;
            padding:8px 10px; margin-bottom:2px;
            border-radius:7px; cursor:pointer;
            transition:all .15s ease;
            position:relative; border:1px solid transparent;
        }
        .file-item:hover { background:var(--bg-hover); }
        .file-item.active {
            background:var(--bg-card); border-color:var(--border);
            box-shadow:0 1px 4px rgba(0,0,0,.05);
        }
        .file-item.active::before {
            content:''; position:absolute; left:-1px; top:6px; bottom:6px;
            width:3px; border-radius:0 3px 3px 0; background:var(--accent);
        }
        .file-item.flash { animation:flash .5s ease; }
        @keyframes flash { 0%{background:var(--accent-bg)} 100%{background:transparent} }
        .fi-icon { color:var(--text-3); flex-shrink:0; display:flex; }
        .file-item.active .fi-icon { color:var(--accent); }
        .fi-info { flex:1; min-width:0; }
        .fi-name {
            font-size:13px; font-weight:500;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .fi-meta {
            font-size:11px; color:var(--text-3); margin-top:1px;
            font-family:'JetBrains Mono',monospace;
        }
        .fi-acts {
            display:flex; gap:2px;
            opacity:0; transition:opacity .15s;
            flex-shrink:0;
        }
        .file-item:hover .fi-acts { opacity:1; }
        .file-item.active .fi-acts { opacity:1; }
        .fa-btn {
            width:24px; height:24px;
            border:none; border-radius:5px;
            background:transparent; color:var(--text-3);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:all .15s;
        }
        .fa-btn:hover { background:var(--bg-active); color:var(--text); }
        .fa-btn.del:hover { color:var(--danger); }
        .rename-input {
            width:100%; border:1px solid var(--accent); border-radius:4px;
            padding:1px 5px; font:500 13px 'Noto Sans SC',sans-serif;
            background:var(--bg-card); color:var(--text); outline:none;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display:flex; align-items:center; justify-content:space-between;
            padding:5px 20px;
            background:var(--bg-card); border-bottom:1px solid var(--border);
            flex-shrink:0;
        }
        .tb-left,.tb-right { display:flex; align-items:center; gap:4px; }
        .fmt-group {
            display:flex; background:var(--bg);
            border:1px solid var(--border); border-radius:7px; padding:2px;
        }
        .fmt-btn {
            width:34px; height:28px;
            border:none; border-radius:5px;
            background:transparent; color:var(--text-2);
            cursor:pointer; transition:all .15s;
            display:flex; align-items:center; justify-content:center;
            font-size:14px;
        }
        .fmt-btn:hover { background:var(--bg-hover); color:var(--text); }
        .fmt-btn.on { background:var(--bg-card); color:var(--accent); box-shadow:0 1px 3px rgba(0,0,0,.07); }
        .fmt-b { font-weight:800; font-family:'Noto Sans SC'; }
        .fmt-u { text-decoration:underline; font-weight:600; font-family:'Noto Sans SC'; text-underline-offset:2px; }

        .t-btn {
            width:32px; height:28px;
            border:1px solid transparent; border-radius:5px;
            background:transparent; color:var(--text-3);
            cursor:pointer; transition:all .15s;
            display:flex; align-items:center; justify-content:center;
        }
        .t-btn:hover { background:var(--bg-hover); color:var(--text-2); border-color:var(--border); }
        .t-btn.on { color:var(--accent); background:var(--accent-bg); }

        .fs-ctrl { display:flex; align-items:center; gap:5px; margin-left:4px; }
        .fs-btn {
            width:26px; height:26px;
            border:1px solid var(--border); border-radius:5px;
            background:var(--bg-card); color:var(--text-2);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:all .15s;
        }
        .fs-btn:hover { border-color:var(--accent); color:var(--accent); }
        .fs-val {
            min-width:26px; text-align:center;
            font:12px 'JetBrains Mono',monospace;
            color:var(--text-2);
        }

        /* ===== 编辑器 ===== */
        .main-area {
            flex:1; min-width:0;
            display:flex; flex-direction:column;
            overflow:hidden;
        }
        .editor-wrap {
            flex:1; min-height:0;
            position:relative; overflow:hidden;
        }
        #editor {
            position:absolute; top:0; left:0; right:0; bottom:0;
            padding:24px 32px;
            background:transparent; border:none; outline:none;
            color:var(--text);
            font-family:'Noto Sans SC',sans-serif;
            font-size:16px; line-height:1.8;
            overflow-y:auto; overflow-x:hidden;
            white-space:pre-wrap; word-wrap:break-word;
            caret-color:var(--accent);
        }
        #editor::-webkit-scrollbar { width:6px; }
        #editor::-webkit-scrollbar-track { background:transparent; }
        #editor::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
        #editor::-webkit-scrollbar-thumb:hover { background:var(--text-3); }
        #editor ::selection, #editor *::selection { background:var(--accent-bg); color:var(--text); }

        .empty {
            position:absolute; inset:0;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            gap:12px; pointer-events:none; z-index:2;
            transition:opacity .3s;
        }
        .empty.hide { opacity:0; }
        .empty-ico {
            width:72px; height:72px;
            border:2px dashed var(--border); border-radius:14px;
            display:flex; align-items:center; justify-content:center;
            color:var(--text-3);
            animation:breathe 3s ease-in-out infinite;
        }
        @keyframes breathe { 0%,100% { opacity:.5; transform:scale(1); } 50% { opacity:.75; transform:scale(1.02); } }
        .empty-t { font-size:14px; color:var(--text-3); }
        .empty-h { font-size:12px; color:var(--text-3); opacity:.6; }
        .empty-h kbd {
            display:inline-block; padding:1px 5px;
            border:1px solid var(--border); border-radius:3px;
            font:11px 'JetBrains Mono',monospace;
            background:var(--bg-card);
        }

        /* ===== 底栏 & 状态 ===== */
        footer {
            position:relative; z-index:20;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 20px;
            background:var(--bg-card); border-top:1px solid var(--border);
        }
        .st-l,.st-r { display:flex; align-items:center; gap:14px; }
        .st {
            font:11px 'JetBrains Mono',monospace;
            color:var(--text-3);
            display:flex; align-items:center; gap:3px;
        }
        .st .dot {
            width:5px; height:5px; border-radius:50%;
            background:var(--success);
            animation:pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
        .save-ind {
            font:11px 'Noto Sans SC',sans-serif;
            color:var(--text-3); opacity:0;
            transition:opacity .25s;
            display:flex; align-items:center; gap:4px;
        }
        .save-ind.on { opacity:1; }
        .save-ind svg { color:var(--success); }

        /* ===== Toast 通知 ===== */
        .toast-box {
            position:fixed; top:64px; right:20px;
            z-index:999;
            display:flex; flex-direction:column; gap:6px;
        }
        .toast {
            display:flex; align-items:center; gap:8px;
            padding:9px 14px; border-radius:8px;
            background:var(--bg-card); border:1px solid var(--border);
            box-shadow:0 6px 24px rgba(0,0,0,.1);
            font-size:13px; color:var(--text);
            transform:translateX(120%); opacity:0;
            transition:all .3s cubic-bezier(.34,1.56,.64,1);
        }
        .toast.in { transform:translateX(0); opacity:1; }
        .toast.out { transform:translateX(120%); opacity:0; transition:all .2s ease-in; }
        .toast svg { color:var(--accent); flex-shrink:0; }

        /* ===== 拖拽覆盖层 ===== */
        .drop-ov {
            position:fixed; inset:0;
            background:rgba(192,128,64,.05);
            border:3px dashed var(--accent);
            z-index:100; display:none;
            align-items:center; justify-content:center;
            backdrop-filter:blur(3px);
        }
        .drop-ov.on { display:flex; }
        .drop-ov span { font-size:17px; color:var(--accent); font-weight:500; }

        /* ===== 专注模式 ===== */
        body.focus { grid-template-rows:0px 1fr 0px; }
        body.focus header { display:none; }
        body.focus footer { display:none; }
        body.focus .sidebar { display:none; }
        body.focus .toolbar { display:none; }
        body.focus #editor { padding:40px 72px; }
        body.focus .focus-exit { display:flex; }
        .focus-exit {
            display:none; position:fixed; top:14px; right:14px; z-index:200;
            width:34px; height:34px;
            border:1px solid var(--border); border-radius:7px;
            background:var(--bg-card); color:var(--text-3);
            cursor:pointer; align-items:center; justify-content:center;
            box-shadow:0 3px 12px rgba(0,0,0,.08);
            transition:all .15s;
        }
        .focus-exit:hover { color:var(--text); border-color:var(--text-3); }

        #fileInput { display:none; }

        /* ===== 响应式 ===== */
        @media (max-width:768px) {
            .sidebar { position:absolute; z-index:30; height:100%; box-shadow:4px 0 16px rgba(0,0,0,.08); }
            .sidebar.collapsed { margin-left:calc(-1 * var(--side-w)); }
            header { padding:0 12px; }
            .toolbar { padding:5px 12px; }
            #editor { padding:18px 14px; }
            .btn .lbl { display:none; }
            .logo-name { display:none; }
            .sep { display:none; }
            footer { padding:0 12px; }
            .st-r { display:none; }
        }
    </style>
</head>
<body>
    <div class="bg-deco"></div>

    <!-- 顶栏 -->
    <header>
        <div class="h-left">
            <button class="btn btn-i" id="btnSide" title="切换侧栏">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2" width="4" height="12" rx="1"/><line x1="8" y1="5" x2="14" y2="5"/><line x1="8" y1="8" x2="14" y2="8"/><line x1="8" y1="11" x2="12" y2="11"/></svg>
            </button>
            <div class="logo">
                <div class="logo-mark">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1.5h6.5L13 5v9.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-13a1 1 0 0 1 1-1z"/><path d="M9.5 1.5V5H13"/></svg>
                </div>
                <div class="logo-name">Text<span>Vault</span></div>
            </div>
        </div>
        <div class="h-right">
            <button class="btn btn-i" id="btnOpen" title="打开文件">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 3h6l1.5-1.5h6V5"/><path d="M1.5 5h13l-1.5 9H3L1.5 5z"/></svg>
            </button>
            <input type="file" id="fileInput" accept=".txt,.md,.log,.csv,.json,.xml,.html,.css,.js,.py,.java,.c,.cpp,.sh,.yml,.yaml,.toml,.ini,.cfg,.conf,.env">
            <button class="btn" id="btnDown" title="下载当前文件">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9.5"/><path d="M4.5 8.5L8 12l3.5-3.5"/><path d="M2 14h12"/></svg>
                <span class="lbl">下载</span>
            </button>
            <div class="sep"></div>
            <button class="btn danger" id="btnClear" title="清空当前文件内容">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10"/><path d="M5.5 4.5V3h5v1.5"/><path d="M4.5 4.5l.8 9h5.4l.8-9"/><line x1="7" y1="7" x2="7" y2="11.5"/><line x1="9" y1="7" x2="9" y2="11.5"/></svg>
                <span class="lbl">清空</span>
            </button>
            <div class="sep"></div>
            <button class="btn btn-i" id="btnFocus" title="专注模式">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 2 2 6 2"/><polyline points="10 2 14 2 14 6"/><polyline points="14 10 14 14 10 14"/><polyline points="6 14 2 14 2 10"/></svg>
            </button>
        </div>
    </header>

    <!-- 主体 -->
    <div class="app-body">
        <aside class="sidebar" id="sidebar">
            <div class="side-head">
                <span class="side-title">文件列表</span>
                <button class="side-new" id="btnNew" title="新建文件">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
                </button>
            </div>
            <div class="file-list" id="fileList"></div>
        </aside>
        <div class="main-area">
            <div class="toolbar">
                <div class="tb-left">
                    <div class="fmt-group">
                        <button class="fmt-btn" id="btnBold" title="加粗 (Ctrl+B)"><span class="fmt-b">B</span></button>
                        <button class="fmt-btn" id="btnULine" title="下划线 (Ctrl+U)"><span class="fmt-u">U</span></button>
                    </div>
                    <div class="sep"></div>
                    <button class="t-btn on" id="btnWrap" title="自动换行">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h12M2 7h12M2 11h8"/><path d="M10 11l-2.5-2M10 11l-2.5 2"/></svg>
                    </button>
                </div>
                <div class="tb-right">
                    <div class="fs-ctrl">
                        <button class="fs-btn" id="fsMinus" title="缩小字体">
                            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="8" x2="13" y2="8"/></svg>
                        </button>
                        <span class="fs-val" id="fsVal">16</span>
                        <button class="fs-btn" id="fsPlus" title="放大字体">
                            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="editor-wrap">
                <div class="empty" id="emptyState">
                    <div class="empty-ico">
                        <svg width="26" height="26" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="1" width="7" height="3" rx=".8"/><path d="M4 3H2.5v12h11V3H12"/><path d="M5.5 7h5M5.5 10h3"/></svg>
                    </div>
                    <div class="empty-t">粘贴或输入文本</div>
                    <div class="empty-h"><kbd>Ctrl</kbd>+<kbd>V</kbd> 粘贴 &middot; <kbd>Ctrl</kbd>+<kbd>B</kbd> 加粗 &middot; <kbd>Ctrl</kbd>+<kbd>U</kbd> 下划线</div>
                </div>
                <div id="editor" contenteditable="true" spellcheck="false"></div>
            </div>
        </div>
    </div>

    <!-- 底栏 -->
    <footer>
        <div class="st-l">
            <div class="st"><span class="dot"></span>就绪</div>
            <div class="st" id="stChars">字符: 0</div>
            <div class="st" id="stWords">字数: 0</div>
            <div class="st" id="stLines">行数: 1</div>
        </div>
        <div class="st-r">
            <div class="save-ind" id="saveInd">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3.5 3.5L13 5"/></svg>
                已自动保存
            </div>
            <div class="st">UTF-8</div>
        </div>
    </footer>

    <div class="toast-box" id="toastBox"></div>
    <div class="drop-ov" id="dropOv"><span>
        <svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><path d="M8 2v8.5"/><path d="M4.5 7.5L8 11l3.5-3.5"/><path d="M2 14h12"/></svg>
        释放以打开文件
    </span></div>
    <button class="focus-exit" id="focusExit" title="退出专注 (Esc)">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 2 2 2 2 6"/><polyline points="14 6 14 2 10 2"/><polyline points="10 14 14 14 14 10"/><polyline points="2 10 2 14 6 14"/></svg>
    </button>

    <script>
    (function() {
        'use strict';

        /* ============================================================
         *  安全与工具函数
         * ============================================================ */
        const PURIFY_CFG = {
            ALLOWED_TAGS: ['br','b','strong','u','i','em','span','div','p'],
            ALLOWED_ATTR: ['style'],
            ALLOW_DATA_ATTR: false,
        };

        // DOMPurify 安全降级：CDN 失败时剥离危险标签
        function safeSanitize(html) {
            if (window.DOMPurify) return DOMPurify.sanitize(html, PURIFY_CFG);
            return html.replace(/<[^>]*(style|on\w+)[^>]*>/gi, '').replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
        }

        function esc(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function uid() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }

        function timeAgo(ts) {
            const d = Date.now() - ts;
            const m = Math.floor(d / 60000);
            if (m < 1) return '刚刚';
            if (m < 60) return m + '分钟前';
            const h = Math.floor(m / 60);
            if (h < 24) return h + '小时前';
            const day = Math.floor(h / 24);
            if (day < 30) return day + '天前';
            return new Date(ts).toLocaleDateString('zh-CN');
        }

        const IC = {
            file: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1.5h6.5L13 5v9.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-13a1 1 0 0 1 1-1z"/><path d="M9.5 1.5V5H13"/></svg>',
            edit: '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2-8 8-3 1 1-3z"/><path d="M10 4l2 2"/></svg>',
            trash: '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10"/><path d="M5.5 4.5V3h5v1.5"/><path d="M4.5 4.5l.8 9h5.4l.8-9"/></svg>',
        };

        /* ============================================================
         *  API 请求函数（与 Cloudflare Workers 交互）
         * ============================================================ */
        const API_BASE = '/api/notes'; // Workers API 路径

        async function apiRequest(method, data = null) {
            const token = localStorage.getItem('token'); // 假设 token 存储在 localStorage
            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };
            
            const options = {
                method,
                headers,
                body: data ? JSON.stringify(data) : null
            };

            const res = await fetch(API_BASE, options);
            if (!res.ok) {
                const error = await res.text();
                throw new Error(`API 错误: ${res.status} ${error}`);
            }
            return res.json();
        }

        async function fetchNotes() {
            return apiRequest('GET');
        }

        async function createNote(content) {
            return apiRequest('POST', { content });
        }

        async function updateNote(id, content) {
            return apiRequest('PUT', { id, content });
        }

        async function deleteNote(id) {
            return apiRequest('DELETE', { id });
        }

        /* ============================================================
         *  Store & 状态管理（多端同步版）
         * ============================================================ */
        const store = {
            files: [],
            activeId: null,
            counter: 1,
            fontSize: 16,
            wordWrap: true,
            isFocus: false,

            // 快捷访问当前活动文件
            get active() {
                return this.files.find(f => f.id === this.activeId) || null;
            },

            // 从 API 获取所有笔记
            async restore() {
                try {
                    const notes = await fetchNotes();
                    this.files = notes;
                    if (notes.length > 0) {
                        this.activeId = notes[0].id;
                    }
                    return true;
                } catch (err) {
                    toast('获取笔记失败: ' + err.message);
                    return false;
                }
            },

            // 创建新笔记（调用 API）
            async createFile(silent, name, content) {
                try {
                    const newNote = await createNote(content);
                    this.files.push(newNote);
                    this.activeId = newNote.id;
                    renderList();
                    loadEditor();
                    if (!silent) toast('已新建: ' + newNote.name);
                    return newNote;
                } catch (err) {
                    toast('创建笔记失败: ' + err.message);
                    return null;
                }
            },

            // 切换笔记
            switchFile(id) {
                if (id === this.activeId) return;
                this.saveCurrent();
                this.activeId = id;
                renderList();
                loadEditor();
            },

            // 删除笔记（调用 API）
            async deleteFile(id) {
                try {
                    await deleteNote(id);
                    const idx = this.files.findIndex(f => f.id === id);
                    if (idx === -1) return;
                    const name = this.files[idx].name;
                    this.files.splice(idx, 1);
                    if (this.activeId === id) {
                        this.activeId = this.files.length ? this.files[0].id : null;
                    }
                    renderList();
                    loadEditor();
                    toast('已删除: ' + name);
                } catch (err) {
                    toast('删除笔记失败: ' + err.message);
                }
            },

            // 重命名笔记（简化版：直接更新前端，后端需支持）
            renameFile(id, newName) {
                const f = this.files.find(x => x.id === id);
                if (f && newName.trim()) {
                    f.name = newName.trim();
                    f.ts = Date.now();
                    renderList();
                }
            },

            // 保存当前笔记（调用 API）
            async saveCurrent() {
                if (!this.activeId) return;
                const f = this.active;
                if (f) {
                    try {
                        const updatedNote = await updateNote(f.id, f.content);
                        f.content = updatedNote.content;
                        f.updatedAt = updatedNote.updatedAt;
                    } catch (err) {
                        toast('保存失败: ' + err.message);
                    }
                }
            },

            // 清空当前笔记
            clearCurrent() {
                const f = this.active;
                if (!f || !getEditorText().trim()) return;
                f.content = '';
                f.ts = Date.now();
                editor.innerHTML = '';
                scheduleStats();
                renderList();
                loadEditor();
                toast('已清空: ' + f.name);
            },

            // 下载当前笔记
            downloadCurrent() {
                const f = this.active;
                const text = getEditorText().trim();
                if (!text) { toast('当前文件为空'); return; }
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (f ? f.name : 'textvault') + '.txt';
                a.click();
                URL.revokeObjectURL(url);
                toast('已下载: ' + a.download);
            },
        };

        /* ============================================================
         *  DOM 引用
         * ============================================================ */
        const editor = document.getElementById('editor');
        const emptyState = document.getElementById('emptyState');
        const fileListEl = document.getElementById('fileList');
        const sidebar = document.getElementById('sidebar');
        const fsVal = document.getElementById('fsVal');
        const stChars = document.getElementById('stChars');
        const stWords = document.getElementById('stWords');
        const stLines = document.getElementById('stLines');
        const saveInd = document.getElementById('saveInd');
        const toastBox = document.getElementById('toastBox');
        const dropOv = document.getElementById('dropOv');
        const fileInput = document.getElementById('fileInput');
        const btnBold = document.getElementById('btnBold');
        const btnULine = document.getElementById('btnULine');

        /* ============================================================
         *  文本提取 & 统计（性能优化版）
         * ============================================================ */
        function getEditorText() {
            return editor.innerText.replace(/\u00A0/g, ' ').trimEnd();
        }

        function countWords(text) {
            if (!text) return 0;
            const cjk = text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3000-\u303f]/g);
            const cjkCount = cjk ? cjk.length : 0;
            const remaining = text.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g, ' ');
            return cjkCount + remaining.trim().split(/\s+/).filter(w => w.length > 0).length;
        }

        function updateStats() {
            const text = getEditorText();
            stChars.textContent = '字符: ' + text.length;
            stWords.textContent = '字数: ' + countWords(text);
            stLines.textContent = '行数: ' + (text ? text.split('\n').length : 0);
        }

        function updateEmpty() {
            emptyState.classList.toggle('hide', getEditorText().length > 0);
        }

        let statsRaf = null;
        function scheduleStats() {
            if (statsRaf) return;
            statsRaf = requestAnimationFrame(() => {
                updateStats();
                updateEmpty();
                statsRaf = null;
            });
        }

        /* ============================================================
         *  文件列表渲染
         * ============================================================ */
        function renderList() {
            fileListEl.innerHTML = store.files.map(f => {
                const isActive = f.id === store.activeId;
                const charCount = (f.content ? getEditorTextFromHTML(f.content) : '').length;
                return '<div class="file-item' + (isActive ? ' active' : '') + '" data-id="' + f.id + '">' +
                    '<span class="fi-icon">' + IC.file + '</span>' +
                    '<span class="fi-info">' +
                        '<span class="fi-name">' + esc(f.name) + '</span>' +
                        '<span class="fi-meta">' + charCount + ' 字 &middot; ' + timeAgo(f.ts) + '</span>' +
                    '</span>' +
                    '<span class="fi-acts">' +
                        '<button class="fa-btn act-rename" title="重命名">' + IC.edit + '</button>' +
                        '<button class="fa-btn del act-del" title="删除">' + IC.trash + '</button>' +
                    '</span>' +
                '</div>';
            }).join('');
        }

        function getEditorTextFromHTML(html) {
            const t = document.createElement('div');
            t.innerHTML = html || '';
            return t.innerText.replace(/\u00A0/g, '');
        }

        /* ============================================================
         *  编辑器核心逻辑
         * ============================================================ */
        document.execCommand('defaultParagraphSeparator', false, 'br');

        function loadEditor() {
            const f = store.active;
            editor.innerHTML = f ? safeSanitize(f.content || '') : '';
            scheduleStats();
        }

        function applyFontSize(s) {
            store.fontSize = Math.max(12, Math.min(30, s));
            fsVal.textContent = store.fontSize;
            editor.style.fontSize = store.fontSize + 'px';
        }
        applyFontSize(store.fontSize);

        document.getElementById('fsMinus').addEventListener('click', () => { applyFontSize(store.fontSize - 1); });
        document.getElementById('fsPlus').addEventListener('click', () => { applyFontSize(store.fontSize + 1); });

        function applyWrap(w) {
            store.wordWrap = w;
            editor.style.whiteSpace = w ? 'pre-wrap' : 'pre';
            editor.style.overflowX = w ? 'hidden' : 'auto';
            document.getElementById('btnWrap').classList.toggle('on', w);
        }
        applyWrap(store.wordWrap);

        document.getElementById('btnWrap').addEventListener('click', () => applyWrap(!store.wordWrap));

        let saveTimer = null;

        editor.addEventListener('input', () => {
            scheduleStats();
            autoSave();
        });

        function autoSave() {
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                store.saveCurrent()
                    .then(() => {
                        saveInd.classList.add('on');
                        setTimeout(() => saveInd.classList.remove('on'), 1400);
                    })
                    .catch(err => {
                        toast('自动保存失败: ' + err.message);
                    });
            }, 700);
        }

        // 安全粘贴：纯文本注入，避免 HTML 污染
        editor.addEventListener('paste', e => {
            e.preventDefault();
            const text = e.clipboardData.getData('text/plain');
            if (!text) return;
            document.execCommand('insertText', false, text);
            requestAnimationFrame(() => { scheduleStats(); autoSave(); });
        });

        editor.addEventListener('keydown', e => {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertText', false, '    ');
            }
        });

        /* ============================================================
         *  格式化状态
         * ============================================================ */
        function updateFmt() {
            btnBold.classList.toggle('on', document.queryCommandState('bold'));
            btnULine.classList.toggle('on', document.queryCommandState('underline'));
        }

        btnBold.addEventListener('mousedown', e => {
            e.preventDefault();
            document.execCommand('bold');
            updateFmt();
        });

        btnULine.addEventListener('mousedown', e => {
            e.preventDefault();
            document.execCommand('underline');
            updateFmt();
        });

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor) updateFmt();
        });
        editor.addEventListener('keyup', updateFmt);
        editor.addEventListener('mouseup', updateFmt);

        /* ============================================================
         *  侧栏交互
         * ============================================================ */
        fileListEl.addEventListener('click', e => {
            const item = e.target.closest('.file-item');
            if (!item) return;
            const id = item.dataset.id;
            if (e.target.closest('.act-rename')) {
                startRename(id);
                return;
            }
            if (e.target.closest('.act-del')) {
                store.deleteFile(id);
                return;
            }
            store.switchFile(id);
        });

        fileListEl.addEventListener('dblclick', e => {
            const nameEl = e.target.closest('.fi-name');
            if (!nameEl) return;
            const item = nameEl.closest('.file-item');
            if (item) startRename(item.dataset.id);
        });

        function startRename(id) {
            const f = store.files.find(x => x.id === id);
            if (!f) return;
            const item = fileListEl.querySelector('[data-id="' + id + '"]');
            const nameEl = item.querySelector('.fi-name');
            const input = document.createElement('input');
            input.type = 'text';
            input.value = f.name;
            input.className = 'rename-input';
            nameEl.replaceWith(input);
            input.focus();
            input.select();
            let done = false;
            const finish = () => {
                if (done) return;
                done = true;
                store.renameFile(id, input.value);
            };
            input.addEventListener('blur', finish);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); finish(); }
                if (e.key === 'Escape') { done = true; renderList(); }
            });
        }

        /* ============================================================
         *  头部按钮 & 文件操作
         * ============================================================ */
        document.getElementById('btnNew').addEventListener('click', () => store.createFile(false));

        document.getElementById('btnOpen').addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) readFile(file);
            fileInput.value = '';
        });

        function readFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const html = esc(e.target.result).replace(/\n/g, '<br>');
                store.createFile(false, file.name.replace(/\.[^.]+$/, ''), safeSanitize(html));
            };
            reader.onerror = () => toast('文件读取失败');
            reader.readAsText(file, 'UTF-8');
        }

        document.getElementById('btnDown').addEventListener('click', () => store.downloadCurrent());
        document.getElementById('btnClear').addEventListener('click', () => store.clearCurrent());

        document.getElementById('btnSide').addEventListener('click', () => sidebar.classList.toggle('collapsed'));

        /* ============================================================
         *  拖拽 & 文件导入
         * ============================================================ */
        let dragN = 0;

        document.addEventListener('dragenter', e => {
            e.preventDefault(); dragN++; dropOv.classList.add('on');
        });
        document.addEventListener('dragleave', e => {
            e.preventDefault(); dragN--;
            if (dragN <= 0) { dragN = 0; dropOv.classList.remove('on'); }
        });
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => {
            e.preventDefault(); dragN = 0; dropOv.classList.remove('on');
            const file = e.dataTransfer.files[0];
            if (file) readFile(file);
        });

        /* ============================================================
         *  专注模式
         * ============================================================ */
        document.getElementById('btnFocus').addEventListener('click', () => {
            store.isFocus = true;
            document.body.classList.add('focus');
            editor.focus();
        });

        document.getElementById('focusExit').addEventListener('click', exitFocus);

        function exitFocus() {
            store.isFocus = false;
            document.body.classList.remove('focus');
        }

        /* ============================================================
         *  快捷键
         * ============================================================ */
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && store.isFocus) exitFocus();

            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                store.saveCurrent()
                    .then(() => {
                        saveInd.classList.add('on');
                        setTimeout(() => saveInd.classList.remove('on'), 1400);
                        toast('已保存');
                    })
                    .catch(err => {
                        toast('保存失败: ' + err.message);
                    });
            }
        });

        /* ============================================================
         *  Toast 通知
         * ============================================================ */
        function toast(msg) {
            const el = document.createElement('div');
            el.className = 'toast';
            el.innerHTML =
                '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3.5 3.5L13 5"/></svg>' +
                esc(msg);
            toastBox.appendChild(el);
            requestAnimationFrame(() => el.classList.add('in'));
            setTimeout(() => {
                el.classList.remove('in');
                el.classList.add('out');
                setTimeout(() => el.remove(), 250);
            }, 2000);
        }

        /* ============================================================
         *  初始化
         * ============================================================ */
        store.restore()
            .then(() => {
                if (store.files.length === 0) {
                    store.createFile(true);
                }
                renderList();
                loadEditor();
                applyFontSize(store.fontSize);
                editor.focus();
            })
            .catch(err => {
                toast('初始化失败: ' + err.message);
            });

    })();
    </script>
</body>
</html>
